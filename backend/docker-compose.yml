version: '3.8'

services:
  # Serviço da API em Python (FastAPI)
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:senha123@db:5432/rolematch_db
    depends_on:
      - db

  # Serviço do Banco de Dados com extensão Espacial (PostGIS)
  db:
    image: postgis/postgis:15-3.3 # Imagem oficial do PostgreSQL + PostGIS
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=senha123
      - POSTGRES_DB=rolematch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: